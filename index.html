<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>alisdair</title>
<meta name="description" content="Alisdair, 15 y/o developer from Scotland." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=Martian+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />

<style>
:root {
  --ink: #f3f5ff;
  --muted: #c3c8dd;
  --accent: #4be3ff;
  --ease: cubic-bezier(.2, .7, .2, 1);
}

* { box-sizing: border-box; }

html, body { height: 100%; }

body {
  margin: 0;
  background: #020306;
  color: var(--ink);
  font-family: "Martian Mono", ui-monospace, monospace;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow: hidden;
}

a { color: inherit; text-decoration: none; }

.bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
  background: #020306;
}

.bg video {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: saturate(1.05) contrast(1.03);
}

.stage {
  position: relative;
  z-index: 4;
  height: 100%;
  display: grid;
  place-items: center;
  padding: 32px 24px;
}

.enter {
  position: fixed;
  inset: 0;
  z-index: 20;
  display: grid;
  place-items: center;
  background: rgba(3, 4, 8, .78);
  backdrop-filter: blur(7px);
  cursor: pointer;
  transition: opacity .7s var(--ease), visibility .7s;
}

.enter.hide { opacity: 0; visibility: hidden; }

.enter-label {
  font-family: "Martian Mono", ui-monospace, monospace;
  font-size: 11px;
  letter-spacing: .42em;
  text-transform: uppercase;
  color: var(--muted);
}

.profile {
  width: min(360px, 92vw);
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

.avatar {
  width: 104px;
  height: 104px;
  border-radius: 50%;
  object-fit: cover;
  background: #0a0d16 center / cover;
  border: 2px solid rgba(255, 255, 255, .3);
  box-shadow: 0 10px 40px rgba(0, 0, 0, .55);
}

.avatar-fallback {
  display: grid;
  place-items: center;
  font-family: "Bricolage Grotesque";
  font-weight: 700;
  font-size: 40px;
  color: var(--accent);
}

.username {
  margin: 18px 0 0;
  font-family: "Bricolage Grotesque", sans-serif;
  font-weight: 700;
  font-size: 30px;
  line-height: 1;
  letter-spacing: .01em;
  background: linear-gradient(90deg, #ff5c5c, #ffb84d, #ffe14d, #5cff8f, #4be3ff, #7c5cff, #ff5cf0, #ff5c5c);
  background-size: 200% auto;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
  filter: drop-shadow(0 2px 10px rgba(0, 0, 0, .5));
  animation: rainbow 6s linear infinite;
}

@keyframes rainbow {
  to { background-position: 200% center; }
}

.bio {
  margin: 10px 0 0;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: .04em;
  text-shadow: 0 1px 8px rgba(0, 0, 0, .7);
}

.socials {
  margin: 22px 0 0;
  display: flex;
  justify-content: center;
  gap: 12px;
}

.socials a {
  width: 40px;
  height: 40px;
  display: grid;
  place-items: center;
  border-radius: 50%;
  color: var(--ink);
  background: rgba(255, 255, 255, .08);
  border: 1px solid rgba(255, 255, 255, .14);
  backdrop-filter: blur(6px);
  transition: .18s var(--ease);
}

.socials a:hover {
  background: rgba(255, 255, 255, .2);
  transform: translateY(-3px);
  border-color: rgba(255, 255, 255, .3);
}

.socials svg { width: 18px; height: 18px; }

@media (prefers-reduced-motion: reduce) {
  .username { animation: none; }
}
</style>
</head>
<body>

<div class="bg">
  <video id="bgvideo" autoplay muted loop playsinline preload="auto" onerror="this.style.display='none'">
    <source src="assets/background.mp4" type="video/mp4" />
  </video>
</div>

<div class="enter" id="enter">
  <span class="enter-label">click to enter</span>
</div>

<main class="stage">
  <section class="profile" aria-label="profile">
    <div class="avatar avatar-fallback" id="avatar">A</div>
    <h1 class="username" id="username">alisdairr</h1>
    <p class="bio" id="bio"></p>
    <div class="socials" id="socials"></div>
  </section>
</main>

<script>
const profile = {
  username: "alisdairr",
  bio: "15 y/o developer from scotland",
  discordId: "1414200535044853760",
  socials: [
    { icon: "github", url: "https://github.com/alisdairrdev" },
    { icon: "discord", url: "https://discord.gg/P2CxH3Q7cJ" },
    { icon: "meta", url: "https://communityforums.atmeta.com/users/alisdairr/1846662" },
    { icon: "mail", url: "mailto:alisdairr@proton.me" },
  ],
};

const icons = {
  github: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5A11.5 11.5 0 0 0 .5 12a11.5 11.5 0 0 0 7.86 10.92c.58.1.79-.25.79-.56v-2c-3.2.7-3.88-1.37-3.88-1.37-.53-1.34-1.3-1.7-1.3-1.7-1.06-.72.08-.71.08-.71 1.17.08 1.79 1.2 1.79 1.2 1.04 1.79 2.73 1.27 3.4.97.1-.76.4-1.27.74-1.56-2.56-.29-5.26-1.28-5.26-5.7 0-1.26.45-2.29 1.19-3.1-.12-.29-.52-1.46.11-3.05 0 0 .97-.31 3.18 1.18a11 11 0 0 1 5.8 0c2.2-1.49 3.17-1.18 3.17-1.18.63 1.59.23 2.76.11 3.05.74.81 1.19 1.84 1.19 3.1 0 4.43-2.7 5.4-5.28 5.69.41.36.78 1.06.78 2.14v3.17c0 .31.21.67.8.56A11.5 11.5 0 0 0 23.5 12 11.5 11.5 0 0 0 12 .5Z"/></svg>',
  discord: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.3 4.4A19.8 19.8 0 0 0 15.4 3l-.25.5a18.3 18.3 0 0 1 4.4 1.4 18 18 0 0 0-16-.02A18 18 0 0 1 8 3.5L7.7 3a19.8 19.8 0 0 0-4.9 1.4C.6 8.9-.15 13.2.1 17.5A19.9 19.9 0 0 0 6.1 20.5l.7-1.1c-.66-.24-1.3-.54-1.9-.9l.47-.35a14 14 0 0 0 12.06 0l.48.35c-.6.36-1.24.66-1.9.9l.7 1.1a19.8 19.8 0 0 0 6-3c.3-4.9-.63-9.1-2.61-13.1ZM8.02 15c-.98 0-1.79-.9-1.79-2s.79-2 1.79-2 1.8.9 1.79 2c0 1.1-.8 2-1.79 2Zm7.95 0c-.98 0-1.79-.9-1.79-2s.79-2 1.79-2 1.8.9 1.79 2c0 1.1-.79 2-1.79 2Z"/></svg>',
  mail: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="2.5" y="4.5" width="19" height="15" rx="2.5"/><path d="m3.5 6 8.5 6 8.5-6"/></svg>',
  meta: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"><path d="M4 12c0-2.4 1.5-4.2 3.6-4.2 3.3 0 4.8 8.4 8.8 8.4 2 0 3.6-1.8 3.6-4.2S21.5 7.8 19.6 7.8c-4 0-5.5 8.4-8.8 8.4C5.5 16.2 4 14.4 4 12Z"/></svg>',
};

const video = document.getElementById('bgvideo');
const enter = document.getElementById('enter');

function playVideo() {
  const attempt = video.play();
  if (attempt && attempt.catch) attempt.catch(() => {});
}

function startBackground() {
  if (!video) return;
  video.muted = true;
  video.defaultMuted = true;
  video.setAttribute('muted', '');
  playVideo();
  video.addEventListener('canplay', playVideo, { once: true });
  document.addEventListener('DOMContentLoaded', playVideo, { once: true });
}

function renderProfile() {
  document.getElementById('username').textContent = profile.username;
  document.getElementById('bio').textContent = profile.bio;
  document.getElementById('avatar').textContent = (profile.username || 'A').trim().charAt(0).toUpperCase() || 'A';

  document.getElementById('socials').innerHTML = profile.socials.map(s => `
    <a href="${s.url}" ${s.url.startsWith('http') ? 'target="_blank" rel="noopener"' : ''} aria-label="${s.icon}">${icons[s.icon] || ''}</a>`).join('');
}

function loadAvatar() {
  const el = document.getElementById('avatar');
  fetch(`https://api.lanyard.rest/v1/users/${profile.discordId}`)
    .then(res => res.json())
    .then(data => {
      const user = data && data.data && data.data.discord_user;
      if (!user || !user.avatar) return;
      const ext = user.avatar.startsWith('a_') ? 'gif' : 'png';
      const url = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.${ext}?size=256`;
      const img = new Image();
      img.onload = () => {
        el.classList.remove('avatar-fallback');
        el.textContent = '';
        el.style.backgroundImage = `url(${url})`;
      };
      img.src = url;
    })
    .catch(() => {});
}

function enterSite() {
  enter.classList.add('hide');
  if (video) {
    video.muted = false;
    video.volume = 0.7;
    try { video.currentTime = 0; } catch (e) {}
    playVideo();
  }
  window.removeEventListener('click', enterSite);
}

startBackground();
renderProfile();
loadAvatar();

enter.addEventListener('click', enterSite);
window.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') enterSite();
}, { once: true });
</script>
</body>
</html>
